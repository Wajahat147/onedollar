<!-- Product dynamic content -->

<script>
const productId = new URLSearchParams(window.location.search).get('id');

async function loadProduct() {
    if (!productId) { location.href = '/shop.html'; return; }
    try {
        const product = await App.request(`/products/${productId}`);
        console.log('--- PRODUCT LOADED ---', product);
        document.title = `${product.name} - One Dollar`;
        
        const main = document.getElementById('product-content');
        main.innerHTML = `
            <div class="py-stack_md text-on-surface-variant font-label-sm text-label-sm flex items-center gap-2">
                <a class="hover:text-primary transition-colors" href="/">Home</a>
                <span class="material-symbols-outlined text-sm">chevron_right</span>
                <a class="hover:text-primary transition-colors" href="/shop.html?category=${product.category}">${product.category}</a>
                <span class="material-symbols-outlined text-sm">chevron_right</span>
                <span class="text-on-background font-label-bold text-label-bold">${product.name}</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-12 gap-gutter mb-stack_lg">
                <div class="md:col-span-7">
                    <div class="w-full aspect-[4/3] rounded-xl overflow-hidden ambient-shadow-lvl1 bg-surface-container img-zoom-container">
                        <img src="${product.images[0]}" class="w-full h-full object-cover img-zoom hover:scale-110 transition-transform duration-1000">
                    </div>
                </div>
                <div class="md:col-span-5 flex flex-col">
                    <div class="flex gap-2 mb-3">
                        <span class="bg-primary-fixed text-on-primary-fixed-variant font-label-sm text-label-sm px-3 py-1 rounded-full">${product.category}</span>
                    </div>
                    <h1 class="font-h2 text-h2 text-on-background mb-2">${product.name}</h1>
                    <div class="flex items-baseline gap-3 mb-6">
                        <span class="font-h1 text-h1 text-primary">Rs. ${product.price}</span>
                        <span class="text-green-600 font-bold">${product.stock > 0 ? 'In Stock' : 'Out of Stock'}</span>
                    </div>
                    <p class="font-body-md text-body-md text-on-surface-variant mb-8">${product.description}</p>
                    <div class="flex flex-col gap-4 mt-auto">
                         <div class="flex items-center gap-4 mb-2">
                            <span class="font-label-bold text-label-bold text-on-surface w-20">Quantity</span>
                            <div class="flex items-center border border-outline-variant rounded-lg overflow-hidden bg-surface-container-lowest h-12">
                                <button onclick="changeQty(-1)" class="px-4 hover:bg-surface-variant h-full transition-colors">-</button>
                                <input id="prod-qty" class="w-12 text-center border-none font-bold bg-transparent" type="text" value="1" readonly/>
                                <button onclick="changeQty(1)" class="px-4 hover:bg-surface-variant h-full transition-colors">+</button>
                            </div>
                        </div>
                        <button onclick='handleAddToCart(${JSON.stringify(product)})' class="w-full bg-slate-900 text-white rounded-xl py-4 font-bold hover:bg-blue-600 transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">shopping_cart_checkout</span>
                            Add to Cart
                        </button>
                    </div>
                </div>
            </div>
        `;
        // Removed AOS re-init to ensure instant visibility
    } catch (err) { console.error(err); }
}

function changeQty(delta) {
    const el = document.getElementById('prod-qty');
    let val = parseInt(el.value) + delta;
    if (val < 1) val = 1;
    el.value = val;
}

function handleAddToCart(product) {
    const qty = parseInt(document.getElementById('prod-qty').value);
    App.addToCart(product, qty);
}

document.addEventListener('DOMContentLoaded', () => {
    loadProduct();
});
</script>
