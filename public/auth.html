<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login / Register - One Dollar</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="/assets/js/app.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fbf8ff; }
        .input-glow:focus { box-shadow: 0 0 0 3px rgba(0, 82, 255, 0.2); border-color: #0052ff; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <a href="/" class="text-3xl font-black text-primary tracking-tighter mb-2 inline-block">One Dollar</a>
            <p class="text-slate-500" id="auth-subtitle">Welcome back! Please login to your account.</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Email Address</label>
                <input type="email" id="login-email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none input-glow transition-all" placeholder="name@example.com">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
                <input type="password" id="login-password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none input-glow transition-all" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg hover:scale-[1.02] transition-all">Login</button>
            <p class="text-center text-sm text-slate-500">
                Don't have an account? <button type="button" onclick="toggleAuth()" class="text-primary font-bold">Register</button>
            </p>
        </form>

        <!-- Register Form (Hidden) -->
        <form id="register-form" class="space-y-4 hidden">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Full Name</label>
                <input type="text" id="reg-name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none input-glow transition-all" placeholder="Ali Khan">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Email Address</label>
                <input type="email" id="reg-email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none input-glow transition-all" placeholder="name@example.com">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
                <input type="password" id="reg-password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none input-glow transition-all" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg hover:scale-[1.02] transition-all">Create Account</button>
            <p class="text-center text-sm text-slate-500">
                Already have an account? <button type="button" onclick="toggleAuth()" class="text-primary font-bold">Login</button>
            </p>
        </form>
    </div>

    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#003ec7' } } } };

        function toggleAuth() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
            const isLogin = !document.getElementById('login-form').classList.contains('hidden');
            document.getElementById('auth-subtitle').innerText = isLogin 
                ? 'Welcome back! Please login to your account.' 
                : 'Join us for smart savings and daily discoveries!';
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await App.request('/auth/login', 'POST', { email, password });
                localStorage.setItem('bb_token', res.token);
                localStorage.setItem('bb_user', JSON.stringify(res.user));
                location.href = '/';
            } catch (err) { alert(err.message); }
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            try {
                const res = await App.request('/auth/register', 'POST', { name, email, password });
                localStorage.setItem('bb_token', res.token);
                localStorage.setItem('bb_user', JSON.stringify(res.user));
                location.href = '/';
            } catch (err) { alert(err.message); }
        };
    </script>
</body>
</html>
